<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Sistema Almoxarifado</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="shortcut icon" href="/almoxarifado_app/frontend/logodeltaofc.png">

</head>

<body>

<div class="layout">

<aside class="sidebar">

<h2>📦 Almoxarifado</h2>

<ul>

<li id="btnMov" onclick="mostrarMovimentacoes()" class="active">
Movimentações
</li>

<li id="btnHist" onclick="mostrarHistorico()">
Histórico
</li>

</ul>

</aside>

<main class="content">

<header>

<h1 id="tituloPagina">
Movimentações
</h1>

<div>

<button id="btnPDF" class="btn-gray" onclick="baixarPDF()" style="display:none">
Baixar PDF
</button>

<button id="btnEnviar" class="btn-gray" onclick="enviarParaAPI()">
Enviar
</button>

<button class="btn" onclick="abrirModal()">
+ Nova Movimentação
</button>

</div>

</header>

<div class="table-box">

<table>

<thead id="thead"></thead>

<tbody id="tabela"></tbody>

</table>

</div>

</main>

</div>


<div id="modal" class="modal">

<div class="modal-content">

<h2>Nova Movimentação</h2>

<input id="produto_id" placeholder="Código do Produto" onblur="buscarProduto()">

<input id="produto" placeholder="Descrição do Produto" readonly>

<input id="quantidade" type="number" placeholder="Quantidade">

<select id="movimentacao" required>
<option value="" disabled selected>Movimentação</option>

<option>Transferência</option>
<option>Devolução</option>
<option>Requisição</option>
</select>

<input id="origem_id" placeholder="Almox Origem" onblur="buscarOrigem()">

<input id="origem" placeholder="Descrição Origem" readonly>

<input id="destino_id" placeholder="Almox Destino" onblur="buscarDestino()">

<input id="destino" placeholder="Descrição Destino" readonly>

<textarea id="observacoes" placeholder="Observações"></textarea>

<div class="modal-buttons">

<button class="btn" onclick="salvarMovimentacao()">
Salvar
</button>

<button class="btn-gray" onclick="fecharModal()">
Cancelar
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
